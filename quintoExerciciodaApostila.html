<html>
<head>
<script>
	
	/* Aqui usarei a conversão de dados no mesmo exercício!*/
	let opMat=prompt('Qual operacao quer? (+,-,*,/,**)')
	let n1 = parseFloat(prompt('Qual primeiro valor?'))
	let n2 = parseFloat(prompt('Qual segundo valor?'))
	let resultado
	if(opMat=='+'){resultado=n1+n2}
	if(opMat=='-'){resultado=n1-n2}
	if(opMat=='*'){resultado=n1*n2}
	if(opMat=='/'){resultado=n1/n2}
	if(opMat=='**'){resultado=n1**n2}
	alert(`O resultado ficou: ${resultado}`)
	
</script>
</head>
</html>

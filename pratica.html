<script>
	let loginCorreto
	let senhaCorreta
	let tentativa=0
	while(tentativa<3){
		loginCorreto=prompt('digite o login')
		senhaCorreta=prompt('digite a senha')
		if((loginCorreto=='anderson') && (senhaCorreta=='oi')){
			alert('entrou')
			break

			alert('errou, tente novamente!')

	}
</script>

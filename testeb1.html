<script>
	let numero1=parseFloat(prompt('qual numero'))
	let op=prompt('qual operacao')
	let numero2=parseFloat(prompt("qual numero 2"))
	if(op=='/')alert(numero1 / numero2)
		if(op=='+')alert(numero1 + numero2)
			if(op=='*')alert(numero1 * numero2)
				if(op=='-')alert(numero1 - numero2)
</script>

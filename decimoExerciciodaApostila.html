<html>
<head>
<script>
	let maior=parseFloat(prompt('digite um numero?'))
	let menor 
	let permanecer
	let entrada
	while(permanecer!='sim'){
	entrada=parseFloat(prompt('qual numero?'))
	if(entrada<maior) {menor=entrada;maior=entrada}
	else{maior=entrada;menor=entrada}
	alert(`O maior numero e: ${maior} e o menor e: ${menor}.`)
	permanecer=prompt('sair?')
	}
	
</script>
</head>
</html>

<html>
<head>
<script>
	/* Primeiro comentário de inúmeros que nunca usarei... objetivo do curso é eu aprender, não ficar igual um louco achando que o que estou aplicando deve ser lido em voz alta, ainda não to fazendo um algoritmo permamente..*/
	let x=prompt('qual a operacao (sub,m,d,ele)')
	let n1=prompt('qual o numero que vamos operar')
	let n2=prompt('qual o segundo numero')

	if(x=='sub'){alert(n1-n2)}
	if(x=='m'){alert(n1*n2)}
	if(x=='d'){alert(n1/n2)}
	if(x=='ele'){alert(n1**n2)}
</script>
</head>
</html>

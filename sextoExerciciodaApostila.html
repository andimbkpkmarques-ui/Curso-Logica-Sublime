<html>
<head>
<script>
	/* Aqui veremos uma calculadora de imc nada eficiente.*/
	let peso=parseFloat(prompt('Qual seu peso?'))
	let altura=parseFloat(prompt('Qual sua altura?'))
	let imc=peso/(altura**)
	
	if(imc>=40){
	alert(`O resultado do imc é ${imc}`)
	} else if(imc>=35){
		alert(`O resultado do imc é ${imc}, Muito Obeso!`)
		} else if(imc>=30){
			alert(`O resultado do imc é ${imc}, Pouco Obeso!`)
			} else if(imc>=25){
				alert(`O resultado do imc é ${imc}, Obeso!`)
				} else if(imc>=20){
					alert(`O resultado do imc é ${imc}, normal!`)
					} else {alert(`O resultado do imc é ${imc}, Melhore!`)}
</script>
</head>
</html>

<html>
<head>
<script>
	/* Aqui estarei repetindo a calculadora mas com a adiçao de uso de 'string' corretamente.*/
	let operacaoMatematica=prompt('qual operacao vai fazer? (-,*,/,**)')
	let n1=prompt("qual primeiro numero?")
	let n2=prompt('qual segundo numero?')
	let resultado
	if(operacaoMatematica == '-'){alert(resultado=n1-n2)}
	if(operacaoMatematica == '*'){alert(resultado=n1*n2)}
	if(operacaoMatematica == '/'){alert(resultado=n1/n2)}
	if(operacaoMatematica == '**'){alert(resultado=n1**n2)}
	alert(`O resultado é: ${resultado}`)
</script>
</head>
</html>

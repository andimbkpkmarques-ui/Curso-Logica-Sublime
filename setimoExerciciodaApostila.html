	let altura = parseFloat(prompt('Qual sua altura?'))

		else if((imc<=39.9) && (imc>=35)){alert(`O resultado do imc e: ${imc}`)}

				else if((imc<=29.9) && (imc>=25)){alert(`O resultado do imc e: ${imc}`)}
					else if((imc<=24.9) && (imc>=20)){alert(`O resultado do imc e: ${imc}`)}
						else {{alert(`Ta magro em!`)}}
</script>
